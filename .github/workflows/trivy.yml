name: Trivy

on:
  workflow_dispatch:
  push:
    paths:
      - '**/Dockerfile*'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - '**/Dockerfile*'
      - 'docker-compose.yml'

jobs:
  trivy:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        # DS-0002 (missing USER) is scoped to router/Dockerfile only via
        # .trivyignore.yaml (router needs root for iptables/NET_ADMIN).
        # We set TRIVY_IGNOREFILE directly because the action's trivyignores
        # parameter concatenates files into plain text, breaking YAML format.
        env:
          TRIVY_IGNOREFILE: .trivyignore.yaml
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
