# Squid proxy for dev-sandbox network isolation.
#
# Agent containers live on an internal Docker network with no gateway.
# Their only path to the internet is through this proxy, which bridges
# the internal network (sandbox-agents) and the external network (dev-sandbox).
#
# Two listening ports with different policies:
#   3128 — locked egress: HTTP(80) and HTTPS(443) only
#   3129 — open egress: all destination ports allowed

# --- Listening ports ---
http_port 3128
http_port 3129

# --- ACL definitions ---

# Which proxy port the client connected to
acl port_locked myport 3128
acl port_open myport 3129

# Allowed destination ports for locked mode
acl safe_ports port 80
acl safe_ports port 443

# CONNECT method (used for HTTPS tunneling)
acl CONNECT method CONNECT

# Defense-in-depth: block RFC1918 / link-local destinations.
# The internal network already prevents direct access, but in case
# the proxy itself can reach LAN, deny it here too.
acl lan dst 10.0.0.0/8
acl lan dst 172.16.0.0/12
acl lan dst 192.168.0.0/16
acl lan dst 169.254.0.0/16

# --- Access rules (evaluated top-to-bottom, first match wins) ---

# Block LAN destinations
http_access deny lan

# Open-egress port: allow everything
http_access allow port_open

# Locked-egress port: allow only safe destination ports
http_access allow port_locked safe_ports

# Deny everything else
http_access deny all

# --- Performance / logging ---
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
cache deny all
forwarded_for delete
via off


pid_filename /var/run/squid/squid.pid

# Timeouts
connect_timeout 30 seconds
read_timeout 300 seconds
